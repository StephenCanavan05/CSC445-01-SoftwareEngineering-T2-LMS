<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Search Book</button>
</form>

{% if book %}
<div class="book-result">
    <h2>{{ book.title }}</h2>
    <p><strong>Author:</strong> {{ book.authors }}</p>
    {% if book.thumbnail %}
    <img src="{{ book.thumbnail }}" alt="Book Cover">
    {% endif %}
</div>
{% endif %}
